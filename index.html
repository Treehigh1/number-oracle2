<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Oracle — Australian Lottery Analysis</title>
  <meta name="description" content="Free Australian lottery analysis tool for Powerball, Oz Lotto, Saturday Lotto, Weekday Windfall, Set for Life, Super 66.">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#06060f}
    @keyframes spin{to{transform:rotate(360deg)}}
    #loading{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px}
    .sp{width:40px;height:40px;border:3px solid rgba(249,115,22,.2);border-top-color:#f97316;border-radius:50%;animation:spin .8s linear infinite}
    #loading p{font-size:14px;color:#475569;font-family:system-ui}
    #err{display:none;text-align:center;padding:40px 20px;min-height:100vh;font-family:system-ui}
    #err h2{color:#ef4444;font-size:20px;margin:12px 0}
    #err p{color:#64748b;font-size:13px;max-width:500px;margin:0 auto 16px;word-break:break-word}
    #err button{background:#f97316;color:#fff;border:none;padding:12px 24px;border-radius:8px;cursor:pointer;font-size:14px}
  </style>
</head>
<body>
  <div id="loading"><div class="sp"></div><p>Loading Number Oracle...</p></div>
  <div id="err"><p style="font-size:48px">⚠️</p><h2>Something went wrong</h2><p id="errmsg"></p><button onclick="location.reload()">Refresh Page</button></div>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>

  <script>
  function showErr(msg){
    document.getElementById('loading').style.display='none';
    document.getElementById('err').style.display='block';
    document.getElementById('errmsg').textContent=String(msg);
  }
  window.onerror=function(m){showErr(m)};

  fetch('lottery-prediction-bot.jsx?t='+Date.now())
  .then(function(r){if(!r.ok)throw new Error('Cannot load app file (HTTP '+r.status+')');return r.text()})
  .then(function(jsx){
    try{
      var js=Babel.transform(jsx,{presets:['env','react']}).code;
      var s=document.createElement('script');
      s.textContent=js+'\n;document.getElementById("loading").style.display="none";ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(LotteryBot));';
      document.body.appendChild(s);
    }catch(e){showErr('Compile: '+e.message)}
  })
  .catch(function(e){showErr('Load: '+e.message)});
  </script>
</body>
</html>
